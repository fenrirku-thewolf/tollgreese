<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廚房大亂鬥 🍳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
  :root {
    --bg:#1a0a2e; --panel:#2d1b4e; --accent:#ff6b35; --accent2:#ffd166;
    --green:#06d6a0; --red:#ef476f; --p1:#ff6b9d; --p2:#4ecdc4; --text:#f8f0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito','Noto Sans TC',sans-serif;color:var(--text);overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;}
  #hud{width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:rgba(255,255,255,0.04);border-bottom:2px solid rgba(255,255,255,0.08);flex-shrink:0;}
  .player-info{display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;}
  .player-icon{font-size:26px;}
  .player-label{font-size:10px;opacity:0.7;}
  #score-box{text-align:center;}
  #score{font-size:30px;font-weight:900;color:var(--accent2);line-height:1;text-shadow:0 0 20px rgba(255,209,102,0.5);}
  #timer-bar-wrap{width:160px;height:7px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;margin-top:3px;}
  #timer-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--accent2));border-radius:99px;transition:width 0.5s linear,background 0.5s;}
  #timer-text{font-size:10px;opacity:0.6;margin-top:2px;}
  #game-wrap{flex:1;width:100%;max-width:900px;overflow:hidden;position:relative;min-height:0;}
  canvas{display:block;width:100%;height:100%;}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,0,30,0.9);backdrop-filter:blur(8px);z-index:100;padding:20px;}
  .overlay h1{font-size:44px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px;}
  .overlay p{opacity:0.75;margin-bottom:4px;font-size:13px;text-align:center;}
  .big-btn{margin-top:18px;padding:12px 36px;border:none;border-radius:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0a2e;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 8px 30px rgba(255,107,53,0.4);transition:transform 0.15s;}
  .big-btn:hover{transform:scale(1.05);}
  .ghost-btn{margin-top:10px;padding:8px 26px;border:2px solid rgba(255,255,255,0.2);border-radius:50px;background:transparent;color:var(--text);font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;}
  .star-row{font-size:36px;letter-spacing:8px;margin:8px 0;}
  .final-score{font-size:44px;font-weight:900;color:var(--accent2);}
  #orders-panel{width:100%;max-width:900px;padding:6px 14px;display:flex;gap:8px;align-items:flex-start;background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.06);min-height:82px;overflow-x:auto;flex-shrink:0;}
  .order-card{background:var(--panel);border:2px solid rgba(255,255,255,0.12);border-radius:11px;padding:6px 10px;min-width:105px;flex-shrink:0;font-size:11px;}
  .order-card .dish-icon{font-size:22px;display:block;text-align:center;}
  .order-card .dish-name{text-align:center;font-weight:700;font-size:10px;margin-top:1px;}
  .order-timer{height:3px;background:rgba(255,255,255,0.1);border-radius:99px;margin-top:5px;overflow:hidden;}
  .order-timer-fill{height:100%;border-radius:99px;}
  .order-pts{text-align:center;font-size:9px;color:var(--accent2);font-weight:700;}
  #recipe-btn{position:absolute;top:7px;right:7px;background:rgba(255,209,102,0.15);border:1.5px solid rgba(255,209,102,0.35);border-radius:9px;padding:4px 9px;font-size:12px;font-weight:800;color:var(--accent2);cursor:pointer;z-index:20;font-family:inherit;}
  #recipe-panel{position:absolute;inset:0;background:rgba(10,0,30,0.95);backdrop-filter:blur(10px);z-index:90;display:none;flex-direction:column;align-items:center;padding:18px;overflow-y:auto;}
  #recipe-panel h2{font-size:22px;font-weight:900;color:var(--accent2);margin-bottom:12px;}
  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;width:100%;max-width:680px;}
  .recipe-card{background:var(--panel);border:1.5px solid rgba(255,255,255,0.1);border-radius:13px;padding:11px;text-align:center;}
  .recipe-card .r-icon{font-size:30px;}
  .recipe-card .r-name{font-size:13px;font-weight:900;color:var(--accent2);margin:3px 0 2px;}
  .recipe-card .r-pts{font-size:10px;color:var(--green);font-weight:700;margin-bottom:7px;}
  .recipe-card .r-steps{font-size:10px;opacity:0.8;line-height:1.9;text-align:left;}
  .recipe-card .r-steps .step{display:flex;align-items:center;gap:4px;}
  .recipe-card .r-steps .step-num{background:rgba(255,255,255,0.1);border-radius:50%;width:14px;height:14px;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .legend{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:12px;max-width:680px;}
  .legend-item{background:rgba(255,255,255,0.06);border-radius:7px;padding:4px 9px;font-size:11px;}
  .close-btn{margin-top:14px;padding:8px 26px;border:none;border-radius:50px;background:var(--accent);color:#fff;font-family:inherit;font-size:13px;font-weight:900;cursor:pointer;}
  .score-popup{position:absolute;font-size:19px;font-weight:900;color:var(--accent2);pointer-events:none;z-index:50;text-shadow:0 2px 8px rgba(0,0,0,0.8);animation:popUp 1.2s forwards;}
  @keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-55px) scale(1.4);}}
</style>
</head>
<body>

<div id="hud">
  <div class="player-info">
    <div class="player-icon">🧑‍🍳</div>
    <div>
      <div class="player-label">玩家一</div>
      <div style="color:var(--p1);font-size:12px">WASD + F</div>
    </div>
  </div>
  <div id="score-box">
    <div id="level-badge" style="font-size:10px;color:var(--accent2);opacity:0.8;font-weight:800;">第 1 關</div>
    <div id="score">0</div>
    <div id="goal-display" style="font-size:10px;color:var(--green);font-weight:800;margin-bottom:2px;">🎯 目標 500 分</div>
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    <div id="timer-text">⏱ 3:00</div>
  </div>
  <div class="player-info" style="flex-direction:row-reverse">
    <div class="player-icon">👩‍🍳</div>
    <div style="text-align:right">
      <div class="player-label">玩家二</div>
      <div style="color:var(--p2);font-size:12px">↑↓←→ + Num0</div>
    </div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="canvas"></canvas>

  <div class="overlay" id="startOverlay">
    <h1>廚房大亂鬥</h1>
    <div style="font-size:42px;margin:6px 0">🍅🔪🍽️</div>
    <p id="start-level-title" style="font-size:16px;font-weight:900;color:var(--accent2);opacity:1">第一關：新手廚房</p>
    <p id="start-level-desc">切好番茄，放上盤子，送到出餐口！</p>
    <p id="start-level-hint" style="color:var(--green);font-size:11px;font-weight:800;"></p>
    <p id="start-level-goal" style="color:var(--accent2);font-size:12px;font-weight:800;opacity:1;">🎯 目標：3分鐘內達到 500 分</p>
    <div style="margin:8px 0;height:1px;width:240px;background:rgba(255,255,255,0.1)"></div>
    <p style="font-size:11px;">玩家一: WASD移動 · F互動</p>
    <p style="font-size:11px;">玩家二: 方向鍵移動 · Numpad0互動</p>
    <p style="font-size:11px;color:var(--accent2);margin-top:4px;">面向站台旁邊再按互動鍵</p>
    <button class="big-btn" id="start-btn">開始遊戲！</button>
  </div>

  <button id="recipe-btn" onclick="toggleRecipe()">📖 食譜</button>
  <div id="recipe-panel">
    <h2>📖 食譜書</h2>
    <div class="recipe-grid" id="recipe-grid"></div>
    <div style="margin-top:14px;max-width:680px;width:100%;">
      <div style="font-size:12px;font-weight:800;color:var(--accent2);margin-bottom:7px;">🏗️ 站台說明</div>
      <div class="legend">
        <div class="legend-item">🧅 洋蔥台</div><div class="legend-item">🍄 蘑菇台</div>
        <div class="legend-item">🍅 番茄台</div><div class="legend-item">🍞 麵包台</div>
        <div class="legend-item">🔪 砧板—切菜</div><div class="legend-item">🔥 爐灶—烹煮</div>
        <div class="legend-item">🍽️ 盤子—擺盤</div><div class="legend-item">📦 出餐口—送餐</div>
        <div class="legend-item">🗑️ 垃圾桶—丟棄</div>
      </div>
    </div>
    <button class="close-btn" onclick="toggleRecipe()">關閉</button>
  </div>

  <div class="overlay" id="endOverlay" style="display:none">
    <h1>時間到！</h1>
    <div class="star-row" id="starRow">⭐</div>
    <div class="final-score" id="finalScore">0 分</div>
    <p id="endMsg" style="margin-top:6px;opacity:1;font-size:14px;"></p>
    <button class="big-btn" id="retry-btn">再試一次！</button>
  </div>

  <div class="overlay" id="levelClearOverlay" style="display:none">
    <div style="font-size:54px;margin-bottom:4px">🎉</div>
    <h1 id="lc-title">第一關通關！</h1>
    <div class="final-score" id="lc-score" style="margin:8px 0">0 分</div>
    <div id="lc-next-preview" style="font-size:12px;color:var(--accent2);font-weight:800;margin-bottom:5px;opacity:0.9;"></div>
    <button class="big-btn" id="lc-next-btn" style="background:linear-gradient(135deg,var(--green),var(--accent2))">下一關 →</button>
    <button class="ghost-btn" id="lc-retry-btn">重玩本關</button>
  </div>
</div>

<div id="orders-panel"></div>

<script>
// ═══════════════════════════════════════════════════════
// CORE CONSTANTS
// ═══════════════════════════════════════════════════════
const TILE = 60; // logical tile size — world coords use this

// ─── MAPS ───────────────────────────────────────────────
// 15 cols × 8 rows，每行精確 15 字元
// 半開放式：中間站台為島嶼，玩家可繞行整張地圖自由通行
// 出餐口 DD 固定在 row3 col12-13，面右互動
const MAP_SIMPLE = [
  'WWWWWWWWWWWWWWW',  // row 0
  'WWWWtWWWWPWTWWW',  // row 1: 番茄t=4, 盤P=9, 垃圾T=11
  'W.............W',  // row 2
  'W.....WW....DDW',  // row 3: 島嶼頂, D=12-13
  'W.....CW......W',  // row 4: 砧板C=6
  'W.....WW......W',  // row 5: 島嶼底
  'W.............W',  // row 6
  'WWWWWWWWWWWWWWW',  // row 7
];
const MAP_BURGER = [
  'WWWWWWWWWWWWWWW',
  'WWtWbWWWWPWTWWW',  // 番茄t=2, 麵包b=4
  'W.............W',
  'W.....WW....DDW',
  'W.....CW......W',
  'W.....WW......W',
  'W.............W',
  'WWWWWWWWWWWWWWW',
];
const MAP_SOUP = [
  'WWWWWWWWWWWWWWW',
  'WWWWtWWWWPWTWWW',
  'W.............W',
  'W.....WW....DDW',
  'W.....CS......W',  // 砧板C=6, 爐灶S=7
  'W.....WW......W',
  'W.............W',
  'WWWWWWWWWWWWWWW',
];
const MAP_MIXED = [
  'WWWWWWWWWWWWWWW',
  'WoWmWtWbWPWTWWW',  // o=1,m=3,t=5,b=7
  'W.............W',
  'W.....WW....DDW',
  'W.....CS.C....W',  // C=6,S=7,C=9
  'W.....WW......W',
  'W.............W',
  'WWWWWWWWWWWWWWW',
];
const MAP_FULL = [
  'WWWWWWWWWWWWWWW',
  'WoWmWtWbWPWTWWW',
  'W.............W',
  'W.....WW....DDW',
  'W.....CSSC....W',  // C=6,S=7,S=8,C=9
  'W.....WW......W',
  'W.............W',
  'WWWWWWWWWWWWWWW',
];

// ─── RECIPES ────────────────────────────────────────────
const R_TOMATO_SLICE  = { name:'番茄片', icon:'🍅', ingredients:['tomato'], needsChop:['tomato'], needsCook:false, pts:80,  time:30 };
const R_TOMATO_BURGER = { name:'番茄堡', icon:'🌮', ingredients:['tomato','bun'], needsChop:['tomato'], needsCook:false, pts:120, time:30 };
const R_TOMATO_SOUP   = { name:'番茄湯', icon:'🍲', ingredients:['tomato'], needsChop:['tomato'], needsCook:true,  pts:90,  time:30 };
const R_MUSHROOM_SOUP = { name:'雜菌湯', icon:'🥘', ingredients:['mushroom','onion'], needsChop:['mushroom','onion'], needsCook:true, pts:150, time:30 };
const R_ONION_BURGER  = { name:'洋蔥堡', icon:'🍔', ingredients:['onion','bun'], needsChop:['onion'], needsCook:false, pts:100, time:30 };

const LEVELS = [
  { num:1,  title:'第一關：新手廚房',       desc:'切好番茄，放上盤子，送到出餐口！',           hint:'🍅切→🍽️盤→📦送出',           goalScore:500,      timeLimit:180, map:MAP_SIMPLE, recipes:[R_TOMATO_SLICE],   spawnRate:0.5,  maxOrders:3 },
  { num:2,  title:'第二關：番茄堡',         desc:'切番茄 + 拿麵包，放到盤子送出！',           hint:'🍅切+🍞→🍽️盤→📦送出',         goalScore:600,      timeLimit:180, map:MAP_BURGER, recipes:[R_TOMATO_BURGER],  spawnRate:0.5,  maxOrders:3 },
  { num:3,  title:'第三關：番茄湯',         desc:'切番茄後還要用爐灶烹煮！',                  hint:'🍅切→🔥煮→🍽️盤→📦送出',       goalScore:600,      timeLimit:180, map:MAP_SOUP,   recipes:[R_TOMATO_SOUP],    spawnRate:0.5,  maxOrders:3 },
  { num:4,  title:'第四關：雜菌湯',         desc:'蘑菇＋洋蔥都要切，一起下鍋！',              hint:'🍄切+🧅切→🔥煮→🍽️盤→📦送出', goalScore:700,      timeLimit:180, map:MAP_MIXED,  recipes:[R_MUSHROOM_SOUP],  spawnRate:0.5,  maxOrders:3 },
  { num:5,  title:'第五關：洋蔥堡',         desc:'切洋蔥配麵包，速度要快！',                  hint:'🧅切+🍞→🍽️盤→📦送出',         goalScore:600,      timeLimit:180, map:MAP_MIXED,  recipes:[R_ONION_BURGER],   spawnRate:0.5,  maxOrders:3 },
  { num:6,  title:'第六關：番茄堡＋番茄湯', desc:'兩種番茄料理！注意訂單細節！',              hint:'堡不用煮，湯要下鍋！',           goalScore:900,      timeLimit:180, map:MAP_MIXED,  recipes:[R_TOMATO_BURGER, R_TOMATO_SOUP],  spawnRate:0.45, maxOrders:4 },
  { num:7,  title:'第七關：雜菌湯＋洋蔥堡', desc:'複雜流程同時進行，分工合作！',              hint:'一人備料，一人掌鍋！',           goalScore:1000,     timeLimit:180, map:MAP_FULL,   recipes:[R_MUSHROOM_SOUP, R_ONION_BURGER], spawnRate:0.45, maxOrders:4 },
  { num:8,  title:'第八關：三菜聯合',        desc:'番茄堡、番茄湯、雜菌湯三種同時！',         hint:'爐灶資源有限，搶先排隊！',       goalScore:1200,     timeLimit:180, map:MAP_FULL,   recipes:[R_TOMATO_BURGER, R_TOMATO_SOUP, R_MUSHROOM_SOUP],  spawnRate:0.45, maxOrders:4 },
  { num:9,  title:'第九關：四菜全開',        desc:'四種菜色全部登場，高速運轉！',              hint:'一人爐灶，一人出餐！',           goalScore:1500,     timeLimit:180, map:MAP_FULL,   recipes:[R_TOMATO_BURGER, R_TOMATO_SOUP, R_MUSHROOM_SOUP, R_ONION_BURGER], spawnRate:0.42, maxOrders:5 },
  { num:10, title:'第十關：終極挑戰 🏆',     desc:'5分鐘無限挑戰，看看你們能得幾分！',        hint:'沒有目標，只有最高紀錄！',       goalScore:Infinity, timeLimit:300, map:MAP_FULL,   recipes:[R_TOMATO_BURGER, R_TOMATO_SOUP, R_MUSHROOM_SOUP, R_ONION_BURGER], spawnRate:0.4,  maxOrders:5 },
];

const ING = {
  onion:   { raw:'🧅', chopped:'🟡', label:'洋蔥' },
  mushroom:{ raw:'🍄', chopped:'🔶', label:'蘑菇' },
  tomato:  { raw:'🍅', chopped:'🔴', label:'番茄' },
  bun:     { raw:'🍞', chopped:'🍞', label:'麵包' },
};
const ING_NAMES = { onion:'洋蔥', mushroom:'蘑菇', tomato:'番茄', bun:'麵包' };

const TILE_COLORS   = { W:'#3d2a6b', '.':'#241540', C:'#5a3f1a', P:'#2d4a6b', S:'#6b1a1a', T:'#2a2a2a', D:'#1a4a1a', o:'#4a3518', m:'#4a3518', t:'#4a3518', b:'#4a3518' };
const TILE_ICONS    = { C:'🔪', P:'🍽️', S:'🔥', T:'🗑️', D:'📦', o:'🧅', m:'🍄', t:'🍅', b:'🍞' };
const STATION_NAMES = { C:'砧板', P:'盤子', S:'爐灶', T:'垃圾桶', D:'出餐口', o:'洋蔥', m:'蘑菇', t:'番茄', b:'麵包' };

// ═══════════════════════════════════════════════════════
// RUNTIME STATE
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let currentLevelIdx = 0;
let currentLevel    = LEVELS[0];
let MAP     = currentLevel.map;
let RECIPES = currentLevel.recipes;
let COLS = 15, ROWS = 8;

// Scale factor: pixels per logical tile unit
// Recalculated on resize so world coords (multiples of TILE) map correctly to screen
let scaleX = 1, scaleY = 1;

function resize() {
  const wrap = document.getElementById('game-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  scaleX = canvas.width  / (COLS * TILE);
  scaleY = canvas.height / (ROWS * TILE);
}
window.addEventListener('resize', resize);
resize();

let score = 0, timeLeft = 180, gameRunning = false, tickInterval = null;
let orders  = [];
let players = [];

const stovePots    = {};
const counterItems = {};
const chopProgress = {};
const plateItems   = {};

// ═══════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════
const keysDown = {};
window.addEventListener('keydown', e => {
  keysDown[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyF'   && gameRunning && players[0]) interact(players[0]);
  if ((e.code === 'Numpad0' || e.code === 'Insert') && gameRunning && players[1]) interact(players[1]);
});
window.addEventListener('keyup', e => { keysDown[e.code] = false; });

// ═══════════════════════════════════════════════════════
// COORDINATE HELPERS
// World coords: player x/y in units of pixels (TILE=60 per cell)
// tileAt() / isWalkable() work in tile indices
// ═══════════════════════════════════════════════════════
function tileAt(col, row) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return 'W';
  return MAP[row][col];
}
function isWalkable(col, row) { return tileAt(col, row) === '.'; }
function worldToTile(wx, wy) {
  return { col: Math.floor(wx / TILE), row: Math.floor(wy / TILE) };
}
function ck(col, row) { return row + ',' + col; }

// ═══════════════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════════════
function makePlayer(wx, wy, color) {
  return { x:wx, y:wy, color, held:null, facing:{x:1, y:0}, moving:false, animFrame:0, animTick:0 };
}

const SPEED = 2.5;
function movePlayer(p, dx, dy) {
  if (!dx && !dy) { p.moving = false; return; }
  p.moving = true;
  // Pure single-axis facing: last non-zero axis wins
  if      (dx !== 0 && dy === 0) { p.facing.x = Math.sign(dx); p.facing.y = 0; }
  else if (dy !== 0 && dx === 0) { p.facing.y = Math.sign(dy); p.facing.x = 0; }
  // diagonal: keep previous facing (don't update)
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  const r = 17;
  const nx = p.x + dx * SPEED;
  const ny = p.y + dy * SPEED;
  const tx = worldToTile(nx + (dx>0?r:-r), p.y);
  if (isWalkable(tx.col, tx.row)) p.x = nx;
  const ty = worldToTile(p.x, ny + (dy>0?r:-r));
  if (isWalkable(ty.col, ty.row)) p.y = ny;
  p.animTick++;
  if (p.animTick > 6) { p.animTick = 0; p.animFrame = (p.animFrame+1) % 4; }
}

function getFacingTile(p) {
  // Step exactly 1 tile in the facing direction from center
  const wx = p.x + p.facing.x * TILE;
  const wy = p.y + p.facing.y * TILE;
  return worldToTile(wx, wy);
}

// ═══════════════════════════════════════════════════════
// INTERACT
// ═══════════════════════════════════════════════════════
function interact(p) {
  const {col, row} = getFacingTile(p);
  const tile = tileAt(col, row);
  const key  = ck(col, row);

  if ('omtb'.includes(tile)) {
    if (!p.held) p.held = { type:{o:'onion',m:'mushroom',t:'tomato',b:'bun'}[tile], state:'raw' };
    return;
  }
  if (tile === 'C') {
    if (p.held && p.held.state === 'raw' && p.held.type !== 'bun') {
      if (!chopProgress[key]) { chopProgress[key] = { item:p.held, progress:0 }; p.held = null; }
    } else if (!p.held && chopProgress[key] && chopProgress[key].progress >= 100) {
      p.held = { type:chopProgress[key].item.type, state:'chopped' }; delete chopProgress[key];
    } else if (!p.held && chopProgress[key]) {
      chopProgress[key].progress = Math.min(100, chopProgress[key].progress + 25);
      spawnParticle(col, row, '✂️');
    }
    return;
  }
  if (tile === 'S') {
    if (p.held && !stovePots[key]) { stovePots[key] = { items:[p.held], progress:0 }; p.held = null; }
    else if (!p.held && stovePots[key] && stovePots[key].progress >= 100) { p.held = { type:'cooked', state:'cooked', items:stovePots[key].items }; delete stovePots[key]; }
    else if (p.held && stovePots[key] && stovePots[key].progress < 100) { stovePots[key].items.push(p.held); p.held = null; }
    return;
  }
  if (tile === 'P') {
    if (p.held) { if (!plateItems[key]) plateItems[key]=[]; plateItems[key].push(p.held); p.held=null; }
    else if (plateItems[key] && plateItems[key].length) { p.held={type:'plate',items:[...plateItems[key]]}; delete plateItems[key]; }
    return;
  }
  if (tile === 'D') {
    if (p.held && p.held.type === 'plate') { tryDeliver(p.held.items, col, row); p.held=null; }
    return;
  }
  if (tile === 'T') { p.held=null; spawnParticle(col, row,'🗑️'); return; }
  if (tile === 'W') {
    if (p.held && !counterItems[key]) { counterItems[key]=p.held; p.held=null; }
    else if (!p.held && counterItems[key]) { p.held=counterItems[key]; delete counterItems[key]; }
  }
}

// ═══════════════════════════════════════════════════════
// DELIVERY
// ═══════════════════════════════════════════════════════
function tryDeliver(items, col, row) {
  const flat = [];
  items.forEach(i => {
    if (i.type === 'cooked' && i.items) i.items.forEach(x => flat.push({type:x.type, state:'cooked'}));
    else flat.push(i);
  });
  const sig = flat.map(i => i.type+(i.state||'')).sort().join(',');
  for (let i=0; i<orders.length; i++) {
    const rec = RECIPES.find(r => r.name === orders[i].name);
    if (!rec) continue;
    const needed = rec.ingredients.map(ing => ing+(rec.needsCook?'cooked':(rec.needsChop&&rec.needsChop.includes(ing)?'chopped':'raw'))).sort().join(',');
    if (sig === needed) {
      const pts = orders[i].pts + Math.floor(orders[i].timeLeft/orders[i].totalTime*30);
      score += pts;
      document.getElementById('score').textContent = score;
      if (currentLevel.goalScore !== Infinity && score/currentLevel.goalScore >= 0.8)
        document.getElementById('score').style.color = 'var(--green)';
      spawnParticle(col, row, '+'+pts+'✨');
      orders.splice(i,1); spawnOrder(); return;
    }
  }
  spawnParticle(col, row, '❌');
}

// ═══════════════════════════════════════════════════════
// ORDERS
// ═══════════════════════════════════════════════════════
function spawnOrder() {
  if (orders.length >= currentLevel.maxOrders) return;
  const rec = RECIPES[Math.floor(Math.random()*RECIPES.length)];
  orders.push({...rec, timeLeft:rec.time, totalTime:rec.time});
  renderOrders();
}

function renderOrders() {
  const panel = document.getElementById('orders-panel');
  panel.innerHTML = '<div style="font-size:10px;opacity:0.5;writing-mode:vertical-lr;padding:3px 0;flex-shrink:0">訂單</div>';
  orders.forEach((o,i) => {
    const pct = o.timeLeft/o.totalTime*100;
    const col = pct>50?'var(--green)':pct>25?'var(--accent2)':'var(--red)';
    const ingIcons = o.ingredients.map(ing=>{
      let s = ING[ing].raw;
      if(o.needsChop&&o.needsChop.includes(ing)) s+='<span style="font-size:7px">✂️</span>';
      if(o.needsCook) s+='<span style="font-size:7px">🔥</span>';
      return '<span style="font-size:12px">'+s+'</span>';
    }).join('<span style="font-size:7px;opacity:0.4">+</span>');
    const card = document.createElement('div');
    card.className = 'order-card';
    card.innerHTML = `
      <span class="dish-icon">${o.icon}</span>
      <div class="dish-name">${o.name}</div>
      <div style="text-align:center;margin:2px 0;line-height:1.5">${ingIcons}</div>
      <div style="text-align:center;font-size:8px;opacity:0.5;line-height:1.5">⬇️🍽️盤子⬇️📦出餐</div>
      <div class="order-pts">+${o.pts}pt</div>
      <div class="order-timer"><div class="order-timer-fill" style="width:${pct}%;background:${col};transition:width 0.5s linear"></div></div>
    `;
    panel.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════
// PARTICLES — position in tile coords, converted to screen %
// ═══════════════════════════════════════════════════════
function spawnParticle(tileCol, tileRow, text) {
  const wrap = document.getElementById('game-wrap');
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = text;
  // Convert tile centre to % of canvas
  el.style.left = ((tileCol + 0.5) * TILE * scaleX / canvas.width  * 100) + '%';
  el.style.top  = ((tileRow + 0.5) * TILE * scaleY / canvas.height * 100) + '%';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ═══════════════════════════════════════════════════════
// DRAW — all rendering in logical tile units, then scaled
// ═══════════════════════════════════════════════════════
function getItemIcon(item) {
  if (!item) return '';
  if (item.type === 'plate') return '🍽️';
  if (item.type === 'cooked') return '🍲';
  const ing = ING[item.type]; if (!ing) return '❓';
  return item.state==='chopped' ? ing.chopped : ing.raw;
}

function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  // Scale so 1 logical TILE unit = scaleX/scaleY pixels
  ctx.scale(scaleX, scaleY);

  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const t   = MAP[r][c];
      const key = ck(c, r);
      const x   = c * TILE, y = r * TILE;

      // Tile background
      ctx.fillStyle = TILE_COLORS[t] || '#1a0a2e';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, TILE, TILE);

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      // Station icon (top half)
      if (TILE_ICONS[t]) {
        ctx.font = '24px serif';
        ctx.fillText(TILE_ICONS[t], x+TILE/2, y+TILE*0.38);
      }

      // Station name label (bottom of tile)
      if (STATION_NAMES[t]) {
        ctx.font = 'bold 9px Nunito, sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(STATION_NAMES[t], x+TILE/2, y+TILE*0.82);
      }

      // Items on counter
      if (counterItems[key]) {
        ctx.font='18px serif';
        ctx.fillText(getItemIcon(counterItems[key]), x+TILE/2, y+TILE/2+6);
      }

      // Chop board
      if (chopProgress[key]) {
        const cp = chopProgress[key];
        ctx.font='18px serif';
        ctx.fillText(getItemIcon(cp.item), x+TILE/2, y+TILE*0.38);
        ctx.font='bold 9px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.fillText('砧板', x+TILE/2, y+TILE*0.82);
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x+5, y+TILE-10, TILE-10, 5);
        ctx.fillStyle=cp.progress>=100?'#06d6a0':'#ffd166';
        ctx.fillRect(x+5, y+TILE-10, (TILE-10)*cp.progress/100, 5);
      }

      // Plate station
      if (plateItems[key] && plateItems[key].length) {
        ctx.font='14px serif';
        plateItems[key].forEach((it,idx)=>
          ctx.fillText(getItemIcon(it), x+TILE/2+(idx-0.5)*14, y+TILE/2+6));
      }

      // Stove
      if (stovePots[key]) {
        const pot=stovePots[key];
        ctx.font='22px serif'; ctx.fillText('🍲', x+TILE/2, y+TILE*0.38);
        ctx.font='bold 9px Nunito,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.fillText('爐灶', x+TILE/2, y+TILE*0.82);
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x+5, y+TILE-10, TILE-10, 5);
        ctx.fillStyle=pot.progress>=100?'#06d6a0':'#ff6b35';
        ctx.fillRect(x+5, y+TILE-10, (TILE-10)*pot.progress/100, 5);
        if(Math.random()<0.06){ctx.font='10px serif';ctx.fillText('💨',x+TILE/2+Math.random()*8-4,y+5);}
      }
    }
  }

  players.forEach(p => drawPlayer(p));
  ctx.restore();
}

function drawPlayer(p) {
  // p.x, p.y are in the same world coord (TILE units * pixels)
  const px = p.x, py = p.y;
  const bob   = p.moving ? Math.sin(p.animFrame*Math.PI/2)*3 : 0;
  const swing = p.moving ? Math.sin(p.animFrame*Math.PI/2)*15 : 0;
  const fx = p.facing.x, fy = p.facing.y;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(px, py+17, 14, 5, 0, 0, Math.PI*2); ctx.fill();

  // Legs
  const ls = p.moving ? Math.sin(p.animFrame*Math.PI/2)*4 : 0;
  ctx.fillStyle=p.color;
  ctx.beginPath(); ctx.roundRect(px-10, py+9+bob, 8, 13+ls, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(px+2,  py+9+bob, 8, 13-ls, 3); ctx.fill();

  // Arms
  let lax,lay,lbx,lby,rax,ray,rbx,rby;
  if      (fx===1)  { lax=px-5;lay=py-3+bob; lbx=px+9+swing; lby=py-1+bob; rax=px-5;ray=py+2+bob; rbx=px+11+swing;rby=py+3+bob; }
  else if (fx===-1) { lax=px+5;lay=py-3+bob; lbx=px-9-swing; lby=py-1+bob; rax=px+5;ray=py+2+bob; rbx=px-11-swing;rby=py+3+bob; }
  else if (fy===-1) { lax=px-10;lay=py-2+bob; lbx=px-11+swing;lby=py-16+bob; rax=px+10;ray=py-2+bob; rbx=px+11-swing;rby=py-16+bob; }
  else              { lax=px-10;lay=py+2+bob; lbx=px-11+swing;lby=py+12+bob; rax=px+10;ray=py+2+bob; rbx=px+11-swing;rby=py+12+bob; }

  const drawArms = () => {
    ctx.strokeStyle=p.color; ctx.lineWidth=7; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(lax,lay); ctx.lineTo(lbx,lby); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rax,ray); ctx.lineTo(rbx,rby); ctx.stroke();
    ctx.fillStyle='#FFD4A3';
    ctx.beginPath(); ctx.arc(lbx,lby,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rbx,rby,4,0,Math.PI*2); ctx.fill();
  };
  if (fy>=0) drawArms();

  // Body
  ctx.fillStyle=p.color; ctx.beginPath(); ctx.roundRect(px-13,py-16+bob,26,28,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.17)'; ctx.beginPath(); ctx.roundRect(px-7,py-6+bob,14,18,4); ctx.fill();

  // Hat
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.roundRect(px-9,py-31+bob,18,17,[5,5,0,0]); ctx.fill();
  ctx.fillStyle='#eee'; ctx.beginPath(); ctx.roundRect(px-13,py-18+bob,26,6,3); ctx.fill();

  // Face
  ctx.fillStyle='#FFD4A3'; ctx.beginPath(); ctx.arc(px,py-8+bob,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath();
  ctx.arc(px-3.5+fx*1.5, py-9+fy+bob, 1.8, 0, Math.PI*2);
  ctx.arc(px+3.5+fx*1.5, py-9+fy+bob, 1.8, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#a0622a'; ctx.lineWidth=1.2; ctx.beginPath();
  if (p.held) { ctx.moveTo(px-3+fx, py-4+bob); ctx.lineTo(px+3+fx, py-4+bob); }
  else ctx.arc(px+fx*0.4, py-5+bob, 3.5, 0.2, Math.PI-0.2);
  ctx.stroke();

  if (fy<0) drawArms();

  // Facing indicator arrow
  const ax = px + fx*22, ay = py + fy*22 + bob;
  ctx.save(); ctx.translate(ax,ay); ctx.rotate(Math.atan2(fy,fx));
  ctx.globalAlpha=0.5; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,-4); ctx.lineTo(-2,0); ctx.lineTo(-5,4); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=1; ctx.restore();

  // Action bubble
  const ft = getFacingTile(p);
  const ftile = tileAt(ft.col, ft.row);
  const fkey  = ck(ft.col, ft.row);
  let actionIcon = null;
  if ('omtb'.includes(ftile) && !p.held) actionIcon='🖐️';
  else if (ftile==='C') {
    if (p.held&&p.held.state==='raw'&&p.held.type!=='bun') actionIcon='⬇️';
    else if (!p.held&&chopProgress[fkey]&&chopProgress[fkey].progress>=100) actionIcon='🖐️';
    else if (!p.held&&chopProgress[fkey]) actionIcon='✂️';
  }
  else if (ftile==='S') {
    if (p.held&&!stovePots[fkey]) actionIcon='⬇️';
    else if (!p.held&&stovePots[fkey]&&stovePots[fkey].progress>=100) actionIcon='🖐️';
    else if (stovePots[fkey]) actionIcon='🔥';
  }
  else if (ftile==='P') actionIcon=p.held?'⬇️':(plateItems[fkey]&&plateItems[fkey].length?'🖐️':null);
  else if (ftile==='D'&&p.held&&p.held.type==='plate') actionIcon='📦';
  else if (ftile==='T'&&p.held) actionIcon='🗑️';
  else if (ftile==='W') { if(p.held&&!counterItems[fkey]) actionIcon='⬇️'; else if(!p.held&&counterItems[fkey]) actionIcon='🖐️'; }

  if (actionIcon) {
    const bx=px+fx*30, by=py+fy*30+bob-18;
    ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.beginPath(); ctx.roundRect(bx-13,by-13,26,26,6); ctx.fill();
    ctx.strokeStyle=p.color; ctx.lineWidth=2; ctx.stroke();
    ctx.font='14px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(actionIcon,bx,by);
  }

  // Held item
  if (p.held) {
    const hx=px+fx*22+(fy!==0?(p.color==='#ff6b9d'?-17:17):0);
    const hy=py+fy*16+bob-12;
    ctx.font='17px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.held.type==='plate'?'🍽️':getItemIcon(p.held), hx, hy);
  }
}

// ═══════════════════════════════════════════════════════
// RECIPE PANEL
// ═══════════════════════════════════════════════════════
function buildRecipePanel() {
  const grid = document.getElementById('recipe-grid');
  grid.innerHTML = '';
  RECIPES.forEach(rec => {
    const steps = [];
    rec.ingredients.forEach(ing => {
      steps.push('🥬 取 '+(ING_NAMES[ing]||ing));
      if (rec.needsChop&&rec.needsChop.includes(ing)) steps.push('🔪 切 '+(ING_NAMES[ing]||ing));
    });
    if (rec.needsCook) steps.push('🔥 放入爐灶烹煮');
    steps.push('🍽️ 放上盤子');
    steps.push('📦 送到出餐口');
    const card = document.createElement('div');
    card.className='recipe-card';
    card.innerHTML=`<div class="r-icon">${rec.icon}</div><div class="r-name">${rec.name}</div><div class="r-pts">+${rec.pts} 分 · ${rec.time}秒</div><div class="r-steps">${steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div>${s}</div>`).join('')}</div>`;
    grid.appendChild(card);
  });
}
function toggleRecipe() {
  const p=document.getElementById('recipe-panel');
  p.style.display=p.style.display==='flex'?'none':'flex';
}

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
function update() {
  if (!gameRunning) return;
  movePlayer(players[0], (keysDown['KeyD']?1:0)-(keysDown['KeyA']?1:0), (keysDown['KeyS']?1:0)-(keysDown['KeyW']?1:0));
  movePlayer(players[1], (keysDown['ArrowRight']?1:0)-(keysDown['ArrowLeft']?1:0), (keysDown['ArrowDown']?1:0)-(keysDown['ArrowUp']?1:0));
  Object.values(stovePots).forEach(pot => { if(pot.progress<100) pot.progress+=0.3; });
  drawGame();
  requestAnimationFrame(update);
}

function tick() {
  if (!gameRunning) return;
  timeLeft--;
  const m=Math.floor(timeLeft/60), s=String(timeLeft%60).padStart(2,'0');
  document.getElementById('timer-text').textContent='⏱ '+m+':'+s;
  document.getElementById('timer-bar').style.width=(timeLeft/currentLevel.timeLimit*100)+'%';
  if (timeLeft<=30) document.getElementById('timer-bar').style.background='var(--red)';
  else if (timeLeft<=60) document.getElementById('timer-bar').style.background='var(--accent2)';

  if (currentLevel.goalScore!==Infinity && score>=currentLevel.goalScore) { showLevelClear(); return; }

  for (let i=orders.length-1;i>=0;i--) {
    orders[i].timeLeft--;
    if (orders[i].timeLeft<=0) { score=Math.max(0,score-30); document.getElementById('score').textContent=score; orders.splice(i,1); }
  }
  renderOrders();
  if (orders.length<currentLevel.maxOrders && Math.random()<currentLevel.spawnRate) spawnOrder();
  if (timeLeft<=0) endGame();
}

// ═══════════════════════════════════════════════════════
// LEVEL MANAGEMENT
// ═══════════════════════════════════════════════════════
function showStartOverlay(levelIdx) {
  const lv = LEVELS[levelIdx];
  document.getElementById('start-level-title').textContent = lv.title;
  document.getElementById('start-level-desc').textContent  = lv.desc;
  document.getElementById('start-level-hint').textContent  = lv.hint||'';
  document.getElementById('start-level-goal').textContent  = lv.goalScore===Infinity
    ? '🏆 挑戰模式：'+lv.timeLimit/60+'分鐘看看能得幾分！'
    : '🎯 目標：'+lv.timeLimit/60+'分鐘內達到 '+lv.goalScore+' 分';
  document.getElementById('start-btn').onclick = () => startGame(levelIdx);
  // 先隱藏其他所有 overlay，才能顯示開始畫面
  document.getElementById('levelClearOverlay').style.display='none';
  document.getElementById('endOverlay').style.display='none';
  document.getElementById('startOverlay').style.display='flex';
}

function startGame(levelIdx) {
  currentLevelIdx = levelIdx;
  currentLevel    = LEVELS[levelIdx];
  MAP     = currentLevel.map;
  ROWS    = MAP.length;
  COLS    = MAP[0].length;
  RECIPES = currentLevel.recipes;

  ['startOverlay','endOverlay','levelClearOverlay'].forEach(id=>document.getElementById(id).style.display='none');

  score=0; timeLeft=currentLevel.timeLimit; orders=[];
  [stovePots,counterItems,chopProgress,plateItems].forEach(o=>Object.keys(o).forEach(k=>delete o[k]));

  document.getElementById('score').textContent='0';
  document.getElementById('score').style.color='var(--accent2)';
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='linear-gradient(90deg,var(--green),var(--accent2))';
  const m=Math.floor(currentLevel.timeLimit/60), s=String(currentLevel.timeLimit%60).padStart(2,'0');
  document.getElementById('timer-text').textContent='⏱ '+m+':'+s;
  document.getElementById('goal-display').textContent=currentLevel.goalScore===Infinity?'🏆 挑戰模式！':'🎯 目標 '+currentLevel.goalScore+' 分';
  document.getElementById('level-badge').textContent='第 '+currentLevel.num+' 關';

  // Re-calculate scale for new map
  resize();

  // Spawn players in walkable cells (row 3, col 3) and (row 5, col 9)
  players = [
    makePlayer(3*TILE+TILE/2, 3*TILE+TILE/2, '#ff6b9d'),
    makePlayer(9*TILE+TILE/2, 5*TILE+TILE/2, '#4ecdc4'),
  ];

  spawnOrder(); spawnOrder();
  buildRecipePanel();

  gameRunning=true;
  if (tickInterval) clearInterval(tickInterval);
  tickInterval=setInterval(tick,1000);
  requestAnimationFrame(update);
}

function showLevelClear() {
  gameRunning=false; clearInterval(tickInterval);
  document.getElementById('lc-title').textContent='✅ 第 '+currentLevel.num+' 關通關！';
  document.getElementById('lc-score').textContent='得分 '+score+' 分';
  const hasNext=currentLevelIdx+1<LEVELS.length;
  const nb=document.getElementById('lc-next-btn');
  const np=document.getElementById('lc-next-preview');
  if (hasNext) { nb.style.display='block'; np.textContent='下一關：'+LEVELS[currentLevelIdx+1].title; nb.onclick=()=>showStartOverlay(currentLevelIdx+1); }
  else { nb.style.display='none'; np.textContent='🏆 恭喜全關卡通關！'; }
  document.getElementById('lc-retry-btn').onclick=()=>startGame(currentLevelIdx);
  document.getElementById('levelClearOverlay').style.display='flex';
}

function endGame() {
  gameRunning=false; clearInterval(tickInterval);
  const ic=currentLevel.goalScore===Infinity;
  if (ic) {
    const rank=score>=3000?'👑 傳說廚神！':score>=2000?'🥇 超級廚師！':score>=1200?'🥈 資深大廚！':score>=600?'🥉 廚房新星！':'🍳 繼續練習！';
    document.getElementById('starRow').textContent=score>=2000?'⭐⭐⭐':score>=1200?'⭐⭐':'⭐';
    document.getElementById('finalScore').textContent=score+' 分';
    document.getElementById('endMsg').textContent=rank;
  } else {
    const passed=score>=currentLevel.goalScore;
    document.getElementById('starRow').textContent=passed?'⭐⭐⭐':score>=currentLevel.goalScore*0.6?'⭐⭐':'⭐';
    document.getElementById('finalScore').textContent=score+' 分';
    document.getElementById('endMsg').textContent=passed?'達標！目標 '+currentLevel.goalScore+' 分 ✅':'未達標，目標 '+currentLevel.goalScore+' 分，再試試！';
  }
  document.getElementById('retry-btn').onclick=()=>showStartOverlay(currentLevelIdx);
  document.getElementById('endOverlay').style.display='flex';
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
drawGame();
showStartOverlay(0);
</script>
